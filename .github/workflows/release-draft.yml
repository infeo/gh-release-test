name: Test Release (draft preserving)

on:
  workflow_call:
    inputs:
      id:
        description: 'An id'
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create fake files
        run: |
          echo "File 1" > 1.txt
          echo "File 2" > 2.txt
          echo "GitHub run number ${{ github.run_number}}." > github.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: "Test Release ${{ github.run_number }}"
          files: |
            1.txt
            2.txt
            github.txt
          draft: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}